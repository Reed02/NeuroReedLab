<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Testimonials | NeuroReedLab</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- NAVBAR (injected by nav.js) -->
  <div id="navbar"></div>

  <!-- HERO -->
  <header class="hero">
    <div class="hero-badge">
      <span class="hero-badge-dot"></span>
      Community
    </div>
    <h1>What people are <em>saying</em></h1>
    <p>Feedback and kind words from collaborators, mentors, and colleagues.</p>
  </header>

  <div class="divider"><hr /></div>

  <!-- TESTIMONIALS -->
  <div class="testimonials-content">
    <div class="section-label">All testimonials</div>
    <div id="testimonial-container">
      <p style="text-align:center; color:var(--text-muted); font-size:14px; padding:40px 0;">Loading testimonials…</p>
    </div>
    <div class="edit-note">
      Need to update your testimonial? <a href="mailto:r.ledoux.cooper@gmail.com">Email me</a> and I'll take care of it.
    </div>
  </div>

  <!-- FOOTER (injected by nav.js) -->
  <div id="footer"></div>

  <script src="js/nav.js"></script>
  <script src="js/projects.js"></script>
  <script>
    fetch('https://script.google.com/macros/s/AKfycbz9UkFPCEFrulTO6r0VwTAwTfsx9I4n76j2BN6eUEX3mkr3V2QejpdoMUvEFlTWP9xkBA/exec')
      .then(res => res.json())
      .then(data => {
        const container = document.getElementById('testimonial-container');
        if (!data.length) {
          container.innerHTML = "<p style='text-align:center; color:var(--text-muted); font-size:14px; padding:40px 0;'>No testimonials yet — be the first!</p>";
          return;
        }
        container.innerHTML = '';
        data.reverse().forEach(entry => {
          const initials = entry.name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
          const div = document.createElement('div');
          div.className = 'testimonial-card';
          div.innerHTML = `
            <div class="testimonial-quote">"</div>
            <p class="testimonial-text">${entry.message}</p>
            <div class="testimonial-author">
              <div class="author-avatar">${initials}</div>
              <div>
                <div class="author-name">${entry.name}</div>
                <div class="author-role">${entry.role}</div>
              </div>
            </div>`;
          container.appendChild(div);
        });
      })
      .catch(() => {
        document.getElementById('testimonial-container').innerHTML =
          "<p style='text-align:center; color:var(--text-muted); font-size:14px; padding:40px 0;'>Could not load testimonials. Please try again later.</p>";
      });
  </script>
</body>
</html>
