<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Projects | NeuroReedLab</title>

  <style>
    /* GLOBAL STYLES */
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background-color: #e0f7fa; /* light sky blue background */
      color: #064635; /* dark green text for content */
    }

    a {
      text-decoration: none;
    }

    /* HEADER HERO SECTION */
    .hero {
      width: 100%;
      background: linear-gradient(to right, #43a047, #81d4fa); /* green to sky blue gradient */
      padding: 40px 20px;
      text-align: center;
      color: white;
      position: relative;
    }

    .hero h1 {
      margin: 0;
      font-size: 3em;
      font-weight: bold;
    }

    /* NAVBAR OVER HERO */
    .navbar {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
      margin-bottom: 0;
      position: relative;
      z-index: 2;
    }

    .navbar a {
      color: white;
      font-weight: bold;
      padding: 8px 12px;
      border-radius: 4px;
      transition: background 0.2s;
    }

    .navbar a:hover {
      background-color: rgba(255, 255, 255, 0.25);
    }

    /* DROPDOWN */
    .dropdown {
      position: relative;
    }

    .dropdown-content {
      display: none;
      position: absolute;
      top: 100%;
      left: 0;
      background-color: #a5d6a7; /* light green dropdown background */
      min-width: 220px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.15);
      z-index: 1000;
      border-radius: 4px;
    }

    .dropdown-content a {
      display: block;
      padding: 10px 14px;
      font-weight: normal;
      color: #064635; /* dark green text */
    }

    .dropdown-content a:hover {
      background-color: #81d4fa; /* sky blue hover */
      color: white;
    }

    .dropdown:hover .dropdown-content {
      display: block;
    }

    /* PAGE TITLE */
    .page-title {
      font-size: 2.5em;
      margin-top: 30px;
      margin-bottom: 20px;
      color: #064635; /* dark green */
    }

    /* PROJECT GRID */
    .content {
      max-width: 900px;
      margin: 0 auto;
      padding: 20px;
    }

    .projects-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 20px;
      margin-top: 30px;
    }

    .project-card {
      background-color: #ffffff;
      padding: 20px;
      border-radius: 6px;
      text-align: center;
      font-weight: bold;
      color: #064635; /* dark green text */
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      transition: background 0.3s, transform 0.2s;
    }

    .project-card:hover {
      background-color: #81d4fa; /* sky blue */
      color: white;
      transform: translateY(-4px);
    }

    .no-projects {
      text-align: center;
      color: #064635;
      font-style: italic;
      font-size: 1.1em;
      margin-top: 50px;
    }

    /* RESPONSIVE */
    @media (max-width: 600px) {
      .navbar {
        flex-direction: column;
      }

      .projects-grid {
        grid-template-columns: 1fr;
      }
    }

  </style>
</head>

<body>

  <!-- HERO HEADER -->
  <header class="hero">
    <!-- NAVBAR -->
    <nav class="navbar">
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <div class="dropdown">
        <a href="projects.html" class="dropbtn">Projects ▾</a>
        <div class="dropdown-content">
          <a href="Data_Preparation.html">Kaggle Titanic Training Dataset Preparation</a>
          <!-- Add other project links here -->
        </div>
      </div>
      <a href="testimonials.html">Testimonials</a>
      <a href="leave_testimonial.html">Leave a Testimonial</a>
      <a href="contact.html">Contact</a>
    </nav>

    <!-- TITLE -->
    <h1>Projects</h1>
  </header>

  <!-- PAGE CONTENT -->
  <div class="content">

    <!-- PROJECT GRID -->
    <div class="projects-grid">
      <a href="Data_Preparation.html" class="project-card">
        Kaggle Titanic Training Dataset Preparation
      </a>
      <!-- Add more project cards here -->
    </div>

    <!-- NO PROJECTS MESSAGE -->
    <!--
    <div class="no-projects">
      No projects completed yet. Check back soon!
    </div>
    -->

  </div>

</body>
</html>
