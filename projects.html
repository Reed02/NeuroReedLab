<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Projects | NeuroReedLab</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 900px;
      margin: 0 auto;
      padding: 20px;
      background-color: #87ceeb; /* sky blue background */
      color: #1b5e20; /* dark grass green text */
    }

    /* NAVBAR - same as About page */
    .navbar {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 20px;
    }

    .navbar a {
      text-decoration: none;
      color: #1b5e20; /* dark grass green */
      font-weight: bold;
    }

    /* DROPDOWN */
    .dropdown {
      position: relative;
    }

    .dropdown-content {
      display: none;
      position: absolute;
      top: 100%;
      left: 0;
      background-color: #a5d6a7; /* light grass green */
      min-width: 180px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.15);
      z-index: 1000;
      border-radius: 4px;
    }

    .dropdown-content a {
      display: block;
      padding: 10px 14px;
      font-weight: normal;
      color: #1b5e20; /* dark green */
    }

    .dropdown-content a:hover {
      background-color: #4caf50; /* grass green hover */
      color: white;
    }

    .dropdown:hover .dropdown-content {
      display: block;
    }

    /* PAGE TITLE */
    h1 {
      color: #1b5e20;
      text-align: center;
      margin-bottom: 30px;
    }

    /* PROJECT GRID */
    .projects-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 20px;
    }

    .project-card {
      background-color: white;
      padding: 20px;
      border-radius: 6px;
      text-align: center;
      font-weight: bold;
      color: #1b5e20;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      transition: background 0.3s, transform 0.2s, color 0.3s;
    }

    .project-card:hover {
      background-color: #4caf50; /* grass green hover */
      color: white;
      transform: translateY(-4px);
    }

    .no-projects {
      text-align: center;
      color: #1b5e20;
      font-style: italic;
      font-size: 1.1em;
      margin-top: 50px;
    }

    /* RESPONSIVE */
    @media (max-width: 600px) {
      .navbar {
        flex-direction: column;
        align-items: center;
      }

      .projects-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

  <!-- NAVIGATION - exactly like About page -->
  <nav class="navbar">
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <div class="dropdown">
      <a href="projects.html" class="dropbtn">Projects ▾</a>
      <div class="dropdown-content">
        <a href="Data_Preparation.html">Kaggle Titanic Training Dataset Preparation</a>
        <!-- Add other project links here -->

    </div>
    <a href="testimonials.html">Testimonials</a>
    <a href="leave_testimonial.html">Leave a Testimonial</a>
    <a href="contact.html">Contact</a>
  </nav>

  <!-- PAGE TITLE -->
  <h1>Projects</h1>

  <!-- PROJECT GRID -->
  <div class="projects-grid">
    <a href="Data_Preparation.html" class="project-card">
      Kaggle Titanic Training Dataset Preparation
    </a>
    <!-- Add more project cards here -->
  </div>

  <!-- NO PROJECTS MESSAGE -->

</body>
</html>
