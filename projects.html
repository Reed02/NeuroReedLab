<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Projects | NeuroReedLab</title>

  <style>
    /* GLOBAL STYLES */
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background-color: #87ceeb; /* sky blue background */
      color: #1b5e20; /* dark grass green text */
    }

    a {
      text-decoration: none;
    }

    /* HERO HEADER */
    .hero {
      width: 100%;
      background: linear-gradient(to right, #4caf50, #87ceeb); /* grass green → sky blue */
      padding: 50px 20px;
      position: relative;
      color: white;
      text-align: center;
    }

    /* NAVBAR OVER HERO */
    .hero-nav {
      position: absolute;
      top: 15px;
      left: 50%;
      transform: translateX(-50%); /* perfectly center the navbar */
      display: flex;
      justify-content: center;
      gap: 20px;
      z-index: 10;
    }

    .hero-nav a {
      color: white;
      font-weight: bold;
      padding: 10px 15px;
      border-radius: 5px;
      display: inline-flex;
      align-items: center; /* vertical alignment */
      height: 40px;
      line-height: 1;
      transition: background 0.3s, transform 0.2s;
    }

    .hero-nav a:hover {
      background-color: rgba(255, 255, 255, 0.25);
      transform: translateY(-2px);
    }

    /* DROPDOWN */
    .dropdown {
      position: relative;
    }

    .dropdown-content {
      display: none;
      position: absolute;
      top: 100%;
      left: 0;
      background-color: #81c784; /* light grass green */
      min-width: 240px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.15);
      z-index: 1000;
      border-radius: 4px;
    }

    .dropdown-content a {
      display: block;
      padding: 10px 14px;
      font-weight: normal;
      color: #1b5e20;
    }

    .dropdown-content a:hover {
      background-color: #87ceeb; /* sky blue hover */
      color: white;
    }

    .dropdown:hover .dropdown-content {
      display: block;
    }

    /* HERO TITLE */
    .hero h1 {
      font-size: 3em;
      margin: 0;
      margin-top: 40px; /* leave space below navbar */
    }

    /* PAGE CONTENT */
    .content {
      max-width: 900px;
      margin: 0 auto;
      padding: 20px;
    }

    h1.page-title {
      font-size: 2.5em;
      margin-top: 30px;
      margin-bottom: 20px;
      color: #1b5e20;
      text-align: center;
    }

    /* PROJECT GRID */
    .projects-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 20px;
      margin-top: 30px;
    }

    .project-card {
      background-color: #ffffff;
      padding: 20px;
      border-radius: 6px;
      text-align: center;
      font-weight: bold;
      color: #1b5e20;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      transition: background 0.3s, transform 0.2s, color 0.3s;
    }

    .project-card:hover {
      background-color: #87ceeb;
      color: white;
      transform: translateY(-4px);
    }

    .no-projects {
      text-align: center;
      color: #1b5e20;
      font-style: italic;
      font-size: 1.1em;
      margin-top: 50px;
    }

    /* RESPONSIVE */
    @media (max-width: 600px) {
      .hero-nav {
        flex-direction: column;
      }

      .projects-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

  <!-- HERO HEADER -->
  <header class="hero">

    <!-- NAVBAR CENTERED -->
    <nav class="hero-nav">
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <div class="dropdown">
        <a href="projects.html" class="dropbtn">Projects ▾</a>
        <div class="dropdown-content">
          <a href="Data_Preparation.html">Kaggle Titanic Training Dataset Preparation</a>
          <!-- Add other project links here -->
        </div>
      </div>
      <a href="testimonials.html">Testimonials</a>
      <a href="leave_testimonial.html">Leave a Testimonial</a>
      <a href="contact.html">Contact</a>
    </nav>

    <!-- HERO TITLE -->
    <h1>Projects</h1>

  </header>

  <!-- PAGE CONTENT -->
  <div class="content">

    <!-- PROJECT GRID -->
    <div class="projects-grid">
      <a href="Data_Preparation.html" class="project-card">
        Kaggle Titanic Training Dataset Preparation
      </a>
      <!-- Add more project cards here -->
    </div>

    <!-- NO PROJECTS MESSAGE -->
    <!--
    <div class="no-projects">
      No projects completed yet. Check back soon!
    </div>
    -->

  </div>

</body>
</html>
