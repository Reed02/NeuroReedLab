<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Projects | NeuroReedLab</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 900px;
      margin: 0 auto;
      padding: 0;
      background-color: #87ceeb; /* sky blue background */
      color: #1b5e20; /* dark grass green text */
    }

    /* HEADER WRAPPER (behind navbar & title) */
    .header {
      background-color: #4caf50; /* darker grass green header */
      padding: 20px 0 40px 0; /* extra space below navbar */
      text-align: center;
      color: white;
    }

    /* NAVBAR - exactly like About page */
    .navbar {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px;
      margin-bottom: 20px;
    }

    .navbar a {
      text-decoration: none;
      color: white; /* navbar links white for contrast */
      font-weight: bold;
      padding: 8px 12px;
      border-radius: 5px;
      display: inline-flex;
      align-items: center;
      line-height: 1;
      transition: background 0.2s;
    }

    .navbar a:hover {
      background-color: #81c784; /* lighter green hover */
      color: white;
    }

    /* DROPDOWN */
    .dropdown {
      position: relative;
    }

    .dropdown-content {
      display: none;
      position: absolute;
      top: 100%;
      left: 0;
      background-color: #a5d6a7; /* light grass green dropdown */
      min-width: 180px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.15);
      z-index: 1000;
      border-radius: 4px;
    }

    .dropdown-content a {
      display: block;
      padding: 10px 14px;
      font-weight: normal;
      color: #1b5e20;
    }

    .dropdown-content a:hover {
      background-color: #4caf50;
      color: white;
    }

    .dropdown:hover .dropdown-content {
      display: block;
    }

    /* PAGE TITLE */
    h1 {
      color: white; /* title white on header */
      margin: 0;
      margin-top: 10px;
      font-size: 2.5em;
    }

    /* PAGE CONTENT */
    .content {
      max-width: 900px;
      margin: 0 auto;
      padding: 20px;
    }

    /* PROJECT GRID */
    .projects-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 20px;
    }

    .project-card {
      background-color: white;
      padding: 20px;
      border-radius: 6px;
      text-align: center;
      font-weight: bold;
      color: #1b5e20;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      transition: background 0.3s, transform 0.2s, color 0.3s;
    }

    .project-card:hover {
      background-color: #4caf50;
      color: white;
      transform: translateY(-4px);
    }

    .no-projects {
      text-align: center;
      color: #1b5e20;
      font-style: italic;
      font-size: 1.1em;
      margin-top: 50px;
    }

    /* RESPONSIVE */
    @media (max-width: 600px) {
      .navbar {
        flex-direction: column;
        align-items: center;
      }

      .projects-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

  <!-- HEADER WRAPPER -->
  <div class="header">

    <!-- NAVIGATION -->
    <nav class="navbar">
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <div class="dropdown">
        <a href="projects.html" class="dropbtn">Projects ▾</a>
        <div class="dropdown-content">
          <a href="Data_Preparation.html">Kaggle Titanic Training Dataset Preparation</a>
          <!-- Add other project links here -->
        </div>
      </div>
      <a href="testimonials.html">Testimonials</a>
      <a href="leave_testimonial.html">Leave a Testimonial</a>
      <a href="contact.html">Contact</a>
    </nav>

    <!-- PAGE TITLE -->
    <h1>Projects</h1>
  </div>

  <!-- PAGE CONTENT -->
  <div class="content">

    <!-- PROJECT GRID -->
    <div class="projects-grid">
      <a href="Data_Preparation.html" class="project-card">
        Kaggle Titanic Training Dataset Preparation
      </a>
      <!-- Add more project cards here -->
    </div>

    <!-- NO PROJECTS MESSAGE -->
    <!--
    <div class="no-projects">
      No projects completed yet. Check back soon!
    </div>
    -->

  </div>

</body>
</html>
