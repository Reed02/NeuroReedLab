<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Leave a Testimonial | NeuroReedLab</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- NAVBAR (injected by nav.js) -->
  <div id="navbar"></div>

  <!-- HERO -->
  <header class="hero">
    <div class="hero-badge">
      <span class="hero-badge-dot"></span>
      Share your experience
    </div>
    <h1>Leave a <em>testimonial</em></h1>
    <p>Worked with me or have feedback to share? I'd love to hear from you.</p>
  </header>

  <div class="divider"><hr /></div>

  <!-- FORM -->
  <div class="form-content">
    <div class="form-card">

      <div id="form-wrapper">
        <div class="field">
          <label for="name">Name</label>
          <input type="text" id="name" placeholder="Your full name" required />
        </div>
        <div class="field">
          <label for="role">Role / Title</label>
          <input type="text" id="role" placeholder="e.g. Research Scientist, CU Boulder" required />
        </div>
        <div class="field">
          <label for="message">Testimonial</label>
          <textarea id="message" placeholder="Share your experience working with Cooper…" required></textarea>
        </div>
        <button class="submit-btn" id="submit-btn">Submit testimonial</button>
      </div>

      <div class="success-card" id="success-message">
        <div class="success-icon">✦</div>
        <div class="success-title">Thank <em>you!</em></div>
        <div class="success-text">Your testimonial has been received and will appear on the site shortly.</div>
      </div>

    </div>
  </div>

  <!-- FOOTER (injected by nav.js) -->
  <div id="footer"></div>

  <script src="js/nav.js"></script>
  <script src="js/projects.js"></script>
  <script>
    document.getElementById('submit-btn').addEventListener('click', function () {
      const name    = document.getElementById('name').value.trim();
      const role    = document.getElementById('role').value.trim();
      const message = document.getElementById('message').value.trim();
      if (!name || !role || !message) { alert('Please fill in all fields.'); return; }

      const params = new URLSearchParams({ name, role, message });
      fetch('https://script.google.com/macros/s/AKfycbz9UkFPCEFrulTO6r0VwTAwTfsx9I4n76j2BN6eUEX3mkr3V2QejpdoMUvEFlTWP9xkBA/exec', {
        method: 'POST', body: params
      }).then(response => {
        if (response.ok) {
          document.getElementById('form-wrapper').style.display = 'none';
          document.getElementById('success-message').style.display = 'block';
        } else {
          alert('Something went wrong. Please try again.');
        }
      }).catch(() => alert('Something went wrong. Please try again.'));
    });
  </script>
</body>
</html>
